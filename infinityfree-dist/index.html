<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Movie Web</title>
    <script type="module" crossorigin src="/assets/index-Cz1AYbAt.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-CXioXxGk.css">
  </head>
  <body>
    <div id="app">
      <header>
        <div class="container">
          <h1>MovieBox Static</h1>
          <nav>
            <input type="text" id="search-input" placeholder="Search movies..." />
          </nav>
        </div>
      </header>
      
      <main class="container">
        <section id="trending">
          <h2>Trending Now</h2>
          <div id="video-grid" class="grid">
            <p class="loading">Loading content...</p>
          </div>
        </section>
      </main>

      <div id="player-modal" class="modal">
        <div class="modal-content">
          <span class="close">&times;</span>
          <div id="video-container"></div>
          <h2 id="modal-title"></h2>
          <p id="modal-desc"></p>
        </div>
      </div>
    </div>
  </body>
</html>
